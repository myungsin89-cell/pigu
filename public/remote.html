<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>이음초 피구대회 심판 리모컨</title>
  <!-- Google Fonts & FontAwesome -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&family=Outfit:wght@600;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <style>
    :root {
      --primary: #059669;
      --primary-hover: #047857;
      --primary-light: #d1fae5;
      --accent: #e11d48;
      --bg-app: #f4fbf7;
      --bg-card: #ffffff;
      --text-main: #064e3b;
      --text-dark: #1f2937;
      --text-muted: #6b7280;
      --border-color: #d1fae5;
      --radius-md: 14px;
      --radius-sm: 8px;
      --shadow-md: 0 4px 12px rgba(6, 78, 59, 0.05);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      font-family: 'Noto Sans KR', sans-serif;
      background-color: var(--bg-app);
      color: var(--text-dark);
      line-height: 1.5;
    }

    .container {
      max-width: 480px;
      margin: 0 auto;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      padding: 16px;
    }

    /* --- 로그인 화면 --- */
    .login-screen {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 24px;
      padding: 20px;
    }

    .login-card {
      background: var(--bg-card);
      border-radius: var(--radius-md);
      border: 1px solid var(--border-color);
      box-shadow: var(--shadow-md);
      padding: 30px 24px;
      width: 100%;
      text-align: center;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .login-logo {
      height: 60px;
      object-fit: contain;
    }

    .login-title h2 {
      font-size: 1.3rem;
      font-weight: 900;
      color: var(--text-main);
      margin-bottom: 6px;
    }

    .login-title p {
      font-size: 0.85rem;
      color: var(--text-muted);
    }

    .pass-input-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .pass-input {
      font-family: 'Outfit', sans-serif;
      font-size: 1.5rem;
      letter-spacing: 10px;
      text-align: center;
      padding: 12px;
      border: 2px solid var(--border-color);
      border-radius: var(--radius-sm);
      outline: none;
      width: 100%;
      background-color: var(--bg-app);
    }

    .pass-input:focus {
      border-color: var(--primary);
    }

    .btn-login {
      background-color: var(--primary);
      color: white;
      font-weight: 700;
      font-size: 1rem;
      padding: 14px;
      border: none;
      border-radius: var(--radius-sm);
      cursor: pointer;
      width: 100%;
      box-shadow: 0 4px 6px rgba(5, 150, 105, 0.15);
    }

    .error-text {
      color: var(--accent);
      font-size: 0.82rem;
      font-weight: 700;
      display: none;
    }

    /* --- 메인 앱 화면 --- */
    .app-screen {
      display: none;
      flex-direction: column;
      gap: 16px;
    }

    .app-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: white;
      padding: 12px 16px;
      border-radius: var(--radius-md);
      border: 1px solid var(--border-color);
      box-shadow: var(--shadow-md);
    }

    .header-logo-title {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .header-logo {
      height: 32px;
    }

    .header-title h1 {
      font-size: 0.95rem;
      font-weight: 900;
      color: var(--text-main);
    }

    .header-title p {
      font-size: 0.72rem;
      color: var(--text-muted);
      font-weight: 700;
    }

    .btn-logout {
      background: #f3f4f6;
      border: none;
      color: #4b5563;
      padding: 6px 10px;
      border-radius: var(--radius-sm);
      font-size: 0.75rem;
      font-weight: 700;
      cursor: pointer;
    }

    /* --- 오늘 날짜 배너 --- */
    .date-banner {
      background-color: var(--primary-light);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-sm);
      padding: 10px 14px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .date-banner span {
      font-size: 0.9rem;
      font-weight: 800;
      color: var(--text-main);
    }

    .btn-refresh {
      background: transparent;
      border: none;
      color: var(--primary-hover);
      cursor: pointer;
      font-size: 1rem;
    }

    /* --- 경기 목록 --- */
    .matches-list {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .no-matches {
      background: white;
      border-radius: var(--radius-md);
      padding: 40px 20px;
      text-align: center;
      border: 1px dashed var(--border-color);
      color: var(--text-muted);
    }

    .no-matches i {
      font-size: 2.5rem;
      margin-bottom: 12px;
      color: #cbd5e1;
    }

    .no-matches p {
      font-size: 0.9rem;
      font-weight: 500;
    }

    .no-matches span {
      font-size: 0.75rem;
      color: #94a3b8;
    }

    /* --- 경기 카드 --- */
    .match-card {
      background: white;
      border-radius: var(--radius-md);
      border: 1px solid var(--border-color);
      box-shadow: var(--shadow-md);
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      position: relative;
    }

    .match-card.completed {
      border-color: #cbd5e1;
      background-color: #fafbfc;
    }

    .card-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #f0fdf4;
      padding-bottom: 8px;
    }

    .card-meta-left {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .period-badge {
      background-color: var(--primary-light);
      color: var(--primary-hover);
      font-size: 0.75rem;
      font-weight: 800;
      padding: 2px 6px;
      border-radius: 4px;
    }

    .tag-badge {
      font-size: 0.75rem;
      color: var(--text-muted);
      font-weight: 700;
    }

    .status-badge {
      font-size: 0.72rem;
      font-weight: 800;
      padding: 2px 6px;
      border-radius: 4px;
      background-color: #f3f4f6;
      color: #4b5563;
    }

    .status-badge.completed {
      background-color: var(--primary-light);
      color: var(--primary-hover);
    }

    /* --- 결과 입력 버튼 그리드 --- */
    .vs-grid {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .team-select-btn {
      flex: 1;
      background-color: #f9fafb;
      border: 2px solid #e5e7eb;
      padding: 14px 10px;
      border-radius: var(--radius-sm);
      font-size: 0.95rem;
      font-weight: 800;
      color: var(--text-dark);
      cursor: pointer;
      text-align: center;
      transition: all 0.15s ease;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .team-select-btn.selected {
      background-color: var(--primary);
      border-color: var(--primary);
      color: white;
    }

    .vs-txt {
      font-family: 'Outfit', sans-serif;
      font-weight: 800;
      font-size: 0.8rem;
      color: #9ca3af;
      padding: 0 4px;
    }

    /* --- 질서 및 배려 체크박스 --- */
    .manners-box {
      background-color: var(--bg-app);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-sm);
      padding: 10px 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .manners-title {
      font-size: 0.78rem;
      font-weight: 800;
      color: var(--text-main);
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .manners-checks {
      display: flex;
      gap: 16px;
    }

    .manners-label {
      flex: 1;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.85rem;
      font-weight: 700;
      cursor: pointer;
      padding: 6px 4px;
    }

    .manners-label input {
      width: 18px;
      height: 18px;
      accent-color: var(--primary);
    }

    /* --- 심판 수정 입력란 --- */
    .referee-box {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .referee-box label {
      font-size: 0.78rem;
      font-weight: 800;
      color: var(--text-main);
    }

    .referee-input {
      width: 100%;
      padding: 8px 12px;
      border: 1px solid var(--border-color);
      border-radius: var(--radius-sm);
      outline: none;
      font-size: 0.88rem;
    }

    .referee-input:focus {
      border-color: var(--primary);
    }

    /* --- 저장 및 리셋 액션 --- */
    .action-row {
      display: flex;
      gap: 8px;
      margin-top: 4px;
    }

    .btn-action-submit {
      flex: 2;
      background-color: var(--primary-hover);
      color: white;
      border: none;
      padding: 12px;
      border-radius: var(--radius-sm);
      font-size: 0.88rem;
      font-weight: 800;
      cursor: pointer;
    }

    .btn-action-reset {
      flex: 1;
      background-color: #f3f4f6;
      color: #ef4444;
      border: 1px solid #e5e7eb;
      padding: 12px;
      border-radius: var(--radius-sm);
      font-size: 0.85rem;
      font-weight: 700;
      cursor: pointer;
    }

    /* --- 알림 스낵바 --- */
    .snackbar {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background-color: #1e293b;
      color: white;
      padding: 12px 24px;
      border-radius: 50px;
      font-size: 0.88rem;
      font-weight: 700;
      box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
      z-index: 2000;
      transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .snackbar.show {
      transform: translateX(-50%) translateY(0);
    }

    .snackbar i {
      color: #10b981;
    }
  </style>
</head>
<body>

  <div class="container">
    
    <!-- 1. 로그인 인증 화면 -->
    <div id="login-screen" class="login-screen">
      <div class="login-card">
        <img src="이음초 로고.png" alt="이음초등학교 로고" class="login-logo">
        <div class="login-title">
          <h2>심판 원격 리모컨</h2>
          <p>비밀번호를 입력하여 리모컨 권한을 활성화하세요.</p>
        </div>
        <div class="pass-input-group">
          <input type="password" id="remote-password" class="pass-input" placeholder="••••" maxlength="4" autofocus>
          <div id="login-error" class="error-text"><i class="fa-solid fa-circle-xmark"></i> 비밀번호가 틀렸습니다.</div>
        </div>
        <button id="btn-login" class="btn-login">인증하기</button>
      </div>
    </div>

    <!-- 2. 리모컨 조작 메인 화면 -->
    <div id="app-screen" class="app-screen">
      <!-- 헤더 -->
      <header class="app-header">
        <div class="header-logo-title">
          <img src="이음초 로고.png" alt="이음초 로고" class="header-logo">
          <div class="header-title">
            <h1>이음초 피구 리모컨</h1>
            <p><i class="fa-solid fa-mobile-screen-button"></i> 심판 전용 입력기</p>
          </div>
        </div>
        <button id="btn-logout" class="btn-logout">로그아웃</button>
      </header>

      <!-- 날짜 배너 -->
      <div class="date-banner">
        <span id="date-label">오늘의 경기</span>
        <button id="btn-refresh" class="btn-refresh"><i class="fa-solid fa-rotate"></i> 새로고침</button>
      </div>

      <!-- 경기 목록 목록 영역 -->
      <div id="matches-list" class="matches-list">
        <!-- JS로 채워짐 -->
      </div>
    </div>

  </div>

  <!-- 알림 스낵바 -->
  <div id="snackbar" class="snackbar">
    <i class="fa-solid fa-circle-check"></i> <span id="snackbar-msg">저장되었습니다!</span>
  </div>

  <script>
    // --- App Configuration ---
    const config = {
      startDate: new Date('2026-06-22'),
      apiDataUrl: '/api/data',
      apiResultUrl: '/api/match/result'
    };

    // --- State ---
    let state = {
      password: null,
      teams: {},
      matches: [],
      playoffs: [],
      todayFilter: null,
      selectedWinner: {} // matchId -> winnerTeamId
    };

    // --- DOM Elements ---
    const dom = {
      loginScreen: document.getElementById('login-screen'),
      appScreen: document.getElementById('app-screen'),
      remotePassword: document.getElementById('remote-password'),
      btnLogin: document.getElementById('btn-login'),
      loginError: document.getElementById('login-error'),
      btnLogout: document.getElementById('btn-logout'),
      btnRefresh: document.getElementById('btn-refresh'),
      dateLabel: document.getElementById('date-label'),
      matchesList: document.getElementById('matches-list'),
      snackbar: document.getElementById('snackbar'),
      snackbarMsg: document.getElementById('snackbar-msg')
    };

    // --- Init ---
    document.addEventListener('DOMContentLoaded', () => {
      // Check session storage
      const savedPass = sessionStorage.getItem('remotePassword') || sessionStorage.getItem('adminPassword');
      if (savedPass === '0000') {
        successLogin(savedPass);
      }
      
      bindEvents();
    });

    // --- Bind DOM Events ---
    function bindEvents() {
      dom.btnLogin.addEventListener('click', processLogin);
      dom.remotePassword.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') processLogin();
      });

      dom.btnLogout.addEventListener('click', processLogout);
      dom.btnRefresh.addEventListener('click', loadData);
    }

    // --- Login Logic ---
    function processLogin() {
      const pwd = dom.remotePassword.value;
      if (pwd === '0000') {
        dom.loginError.style.display = 'none';
        successLogin(pwd);
      } else {
        dom.loginError.style.display = 'block';
        dom.remotePassword.value = '';
        dom.remotePassword.focus();
      }
    }

    function successLogin(pwd) {
      state.password = pwd;
      sessionStorage.setItem('remotePassword', pwd);
      
      dom.loginScreen.style.display = 'none';
      dom.appScreen.style.display = 'flex';
      
      calculateToday();
      loadData();
    }

    function processLogout() {
      state.password = null;
      sessionStorage.removeItem('remotePassword');
      
      dom.remotePassword.value = '';
      dom.loginScreen.style.display = 'flex';
      dom.appScreen.style.display = 'none';
    }

    // --- Calculate Today Date Context ---
    function calculateToday() {
      const today = new Date();
      
      // Remove hours
      today.setHours(0,0,0,0);
      const start = new Date(config.startDate);
      start.setHours(0,0,0,0);
      
      const diffTime = today - start;
      const diffDays = Math.floor(diffTime / (1000 * 60 * 60 * 24));
      
      const weekNum = Math.floor(diffDays / 7) + 1;
      const daysHan = ["일", "월", "화", "수", "목", "금", "토"];
      const dayHan = daysHan[today.getDay()];
      
      const isValid = (weekNum >= 1 && weekNum <= 4 && today.getDay() >= 1 && today.getDay() <= 5);
      
      state.todayFilter = {
        week: `${weekNum}주`,
        day: dayHan,
        isValid: isValid
      };

      const dateStr = `${today.getMonth() + 1}/${today.getDate()} (${dayHan})`;
      if (isValid) {
        dom.dateLabel.innerHTML = `<i class="fa-solid fa-calendar-check"></i> ${dateStr} - ${weekNum}주차 ${dayHan}요일`;
      } else {
        dom.dateLabel.innerHTML = `<i class="fa-solid fa-calendar-xmark"></i> ${dateStr} - 일정 없음`;
      }
    }

    // --- Load Data from API ---
    async function loadData() {
      try {
        dom.matchesList.innerHTML = '<div style="text-align:center; padding: 20px; color: var(--text-muted);"><i class="fa-solid fa-spinner fa-spin"></i> 로딩 중...</div>';
        
        const res = await fetch(config.apiDataUrl);
        if (!res.ok) throw new Error('API 로드 실패');
        
        const db = await res.json();
        state.teams = db.teams;
        state.matches = db.matches;
        state.playoffs = db.playoffs;
        
        renderMatches();
      } catch (err) {
        console.error(err);
        dom.matchesList.innerHTML = '<div class="no-matches"><i class="fa-solid fa-triangle-exclamation" style="color:var(--accent)"></i><p>서버 데이터를 가져오는데 실패했습니다.</p></div>';
      }
    }

    // --- Calculate playoff team names dynamically ---
    function getPlayoffTeamNames(match) {
      // Find rankings in case it is a playoff match
      const standingsA = calculateStandingsForGroup('group_a');
      const standingsB = calculateStandingsForGroup('group_b');
      
      let t1 = null;
      let t2 = null;
      
      if (match.id === 'playoff_1') {
        t1 = standingsA[1]; // A조 2위
        t2 = standingsB[1]; // B조 2위
      } else if (match.id === 'playoff_2') {
        t1 = standingsA[0]; // A조 1위
        t2 = standingsB[0]; // B조 1위
      }
      
      return {
        team1: t1,
        team2: t2,
        t1Name: t1 ? t1.name : '최강조 2위(대기)',
        t2Name: t2 ? t2.name : '무적조 2위(대기)'
      };
    }

    function calculateStandingsForGroup(groupId) {
      const groupTeams = Object.values(state.teams).filter(t => t.group_id === groupId);
      const standings = {};
      
      groupTeams.forEach(team => {
        standings[team.id] = { id: team.id, name: team.name, won: 0, points: 0 };
      });
      
      state.matches.forEach(match => {
        if (match.group_id !== groupId) return;
        if (!match.result) return;
        
        const t1 = standings[match.team1_id];
        const t2 = standings[match.team2_id];
        
        if (t1 && t2) {
          if (match.result.winner_id === match.team1_id) {
            t1.won++;
            t1.points += 1;
          } else if (match.result.winner_id === match.team2_id) {
            t2.won++;
            t2.points += 1;
          }
        }
      });
      
      return Object.values(standings).sort((a, b) => {
        if (b.points !== a.points) return b.points - a.points;
        if (b.won !== a.won) return b.won - a.won;
        return a.name.localeCompare(b.name, 'ko');
      });
    }

    // --- Render Filtered Matches ---
    function renderMatches() {
      dom.matchesList.innerHTML = '';
      
      if (!state.todayFilter.isValid) {
        dom.matchesList.innerHTML = `
          <div class="no-matches">
            <i class="fa-solid fa-calendar-xmark"></i>
            <p>오늘은 예정된 경기 일정이 없습니다.</p>
            <span>대회 기간: 6/22 ~ 7/17 (평일 진행)</span>
          </div>
        `;
        return;
      }
      
      // Filter matches by current week and day
      const todayMatches = state.matches.filter(m => m.week === state.todayFilter.week && m.day === state.todayFilter.day);
      const todayPlayoffs = state.playoffs.filter(p => p.week === state.todayFilter.week && p.day === state.todayFilter.day);
      
      const allToday = [...todayMatches, ...todayPlayoffs];
      
      if (allToday.length === 0) {
        dom.matchesList.innerHTML = `
          <div class="no-matches">
            <i class="fa-solid fa-circle-check" style="color: var(--primary)"></i>
            <p>오늘 치를 경기가 없습니다.</p>
            <span>(리그 일정표를 확인하세요)</span>
          </div>
        `;
        return;
      }
      
      allToday.forEach(match => {
        const isPlayoff = match.id.startsWith('playoff_');
        let t1Id = '';
        let t2Id = '';
        let t1Name = '';
        let t2Name = '';
        let isPlaceholder = false;
        
        if (isPlayoff) {
          const names = getPlayoffTeamNames(match);
          t1Id = names.team1?.id || '';
          t2Id = names.team2?.id || '';
          t1Name = names.t1Name;
          t2Name = names.t2Name;
          isPlaceholder = (!names.team1 || !names.team2);
        } else {
          t1Id = match.team1_id;
          t2Id = match.team2_id;
          t1Name = (state.teams[t1Id] || { name: t1Id }).name;
          t2Name = (state.teams[t2Id] || { name: t2Id }).name;
        }
        
        const hasResult = !!match.result;
        const currentWinnerId = hasResult ? match.result.winner_id : null;
        
        // Initialize selectedWinner in state if not set
        if (state.selectedWinner[match.id] === undefined) {
          state.selectedWinner[match.id] = currentWinnerId;
        }
        
        const card = document.createElement('div');
        card.className = `match-card ${hasResult ? 'completed' : ''}`;
        card.id = `card-${match.id}`;
        
        const metaTag = isPlayoff ? match.name : `${match.group_id === 'group_a' ? '최강' : '무적'}리그`;
        
        card.innerHTML = `
          <div class="card-meta">
            <div class="card-meta-left">
              <span class="period-badge">${match.period.split(' ')[0]}</span>
              <span class="tag-badge">${metaTag}</span>
            </div>
            <span class="status-badge ${hasResult ? 'completed' : ''}">${hasResult ? '입력완료' : '대기중'}</span>
          </div>
          
          <!-- 승리 팀 선택 그리드 -->
          <div class="vs-grid">
            <button class="team-select-btn ${state.selectedWinner[match.id] === t1Id ? 'selected' : ''}" 
                    data-match-id="${match.id}" 
                    data-team-id="${t1Id}"
                    ${isPlaceholder ? 'disabled' : ''}>
              <span>${t1Name}</span>
              <small style="font-size: 0.7rem; font-weight: normal; opacity: 0.8;">승리 선택</small>
            </button>
            <span class="vs-txt">VS</span>
            <button class="team-select-btn ${state.selectedWinner[match.id] === t2Id ? 'selected' : ''}" 
                    data-match-id="${match.id}" 
                    data-team-id="${t2Id}"
                    ${isPlaceholder ? 'disabled' : ''}>
              <span>${t2Name}</span>
              <small style="font-size: 0.7rem; font-weight: normal; opacity: 0.8;">승리 선택</small>
            </button>
          </div>
          
          <!-- 질서 및 배려 체크박스 -->
          <div class="manners-box">
            <div class="manners-title"><i class="fa-solid fa-heart" style="color: var(--accent);"></i> 질서 및 배려 점수 부여 (+1점)</div>
            <div class="manners-checks">
              <label class="manners-label">
                <input type="checkbox" class="manners-cb-t1" data-match-id="${match.id}" data-team-id="${t1Id}" 
                  ${(match.result && match.result.manners && match.result.manners.includes(t1Id)) ? 'checked' : ''}
                  ${isPlaceholder ? 'disabled' : ''}>
                <span>${t1Name}</span>
              </label>
              <label class="manners-label">
                <input type="checkbox" class="manners-cb-t2" data-match-id="${match.id}" data-team-id="${t2Id}" 
                  ${(match.result && match.result.manners && match.result.manners.includes(t2Id)) ? 'checked' : ''}
                  ${isPlaceholder ? 'disabled' : ''}>
                <span>${t2Name}</span>
              </label>
            </div>
          </div>
          
          <!-- 심판 이름 입력 -->
          <div class="referee-box">
            <label><i class="fa-solid fa-user-tie"></i> 심판 교사명 수정</label>
            <input type="text" class="referee-input" id="referee-${match.id}" value="${match.referee || ''}" placeholder="심판 교사명">
          </div>
          
          <!-- 전송 및 초기화 버튼 -->
          <div class="action-row">
            <button class="btn-action-submit" data-match-id="${match.id}" ${isPlaceholder ? 'disabled' : ''}>
              <i class="fa-solid fa-cloud-arrow-up"></i> ${hasResult ? '결과 수정' : '결과 전송'}
            </button>
            ${hasResult ? `
            <button class="btn-action-reset" data-match-id="${match.id}">
              결과 취소
            </button>
            ` : ''}
          </div>
        `;
        
        dom.matchesList.appendChild(card);
      });
      
      // Bind Team Select click events
      dom.matchesList.querySelectorAll('.team-select-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
          const matchId = e.currentTarget.getAttribute('data-match-id');
          const teamId = e.currentTarget.getAttribute('data-team-id');
          
          // Toggle selection
          if (state.selectedWinner[matchId] === teamId) {
            state.selectedWinner[matchId] = null; // Unselect
          } else {
            state.selectedWinner[matchId] = teamId;
          }
          
          // Refresh buttons visually within the same card
          const card = document.getElementById(`card-${matchId}`);
          card.querySelectorAll('.team-select-btn').forEach(b => {
            const bTeamId = b.getAttribute('data-team-id');
            if (state.selectedWinner[matchId] === bTeamId) {
              b.classList.add('selected');
            } else {
              b.classList.remove('selected');
            }
          });
        });
      });
      
      // Bind action submit click
      dom.matchesList.querySelectorAll('.btn-action-submit').forEach(btn => {
        btn.addEventListener('click', async (e) => {
          const matchId = e.currentTarget.getAttribute('data-match-id');
          await submitMatchResult(matchId);
        });
      });
      
      // Bind action cancel click
      dom.matchesList.querySelectorAll('.btn-action-reset').forEach(btn => {
        btn.addEventListener('click', async (e) => {
          const matchId = e.currentTarget.getAttribute('data-match-id');
          if (confirm('이 경기를 다시 대기 중 상태로 초기화하시겠습니까?')) {
            await resetMatchResult(matchId);
          }
        });
      });
    }

    // --- Submit Results to API ---
    async function submitMatchResult(matchId) {
      const winnerId = state.selectedWinner[matchId];
      if (!winnerId) {
        alert('승리한 반을 먼저 선택하고 전송 버튼을 눌러주세요.');
        return;
      }
      
      const card = document.getElementById(`card-${matchId}`);
      
      // Determine loser ID
      const buttons = card.querySelectorAll('.team-select-btn');
      let loserId = '';
      buttons.forEach(b => {
        const tid = b.getAttribute('data-team-id');
        if (tid !== winnerId) loserId = tid;
      });
      
      // Gather manners selection
      const manners = [];
      const cb1 = card.querySelector('.manners-cb-t1');
      const cb2 = card.querySelector('.manners-cb-t2');
      if (cb1 && cb1.checked && cb1.getAttribute('data-team-id')) manners.push(cb1.getAttribute('data-team-id'));
      if (cb2 && cb2.checked && cb2.getAttribute('data-team-id')) manners.push(cb2.getAttribute('data-team-id'));
      
      // Referee name
      const refereeInput = document.getElementById(`referee-${matchId}`);
      const referee = refereeInput ? refereeInput.value.trim() : '';
      
      try {
        const response = await fetch(config.apiResultUrl, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            password: state.password,
            matchId,
            winnerId,
            loserId,
            referee,
            manners
          })
        });
        
        if (!response.ok) {
          const err = await response.json();
          throw new Error(err.error || '저장 오류');
        }
        
        showSnackbar('경기 결과가 대시보드에 연동되었습니다!');
        await loadData(); // Reload list
      } catch (err) {
        console.error(err);
        alert(err.message || '저장 중 문제가 발생했습니다.');
      }
    }

    // --- Reset Results (Cancel result back to wait status) ---
    async function resetMatchResult(matchId) {
      const refereeInput = document.getElementById(`referee-${matchId}`);
      const referee = refereeInput ? refereeInput.value.trim() : '';
      
      try {
        const response = await fetch(config.apiResultUrl, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            password: state.password,
            matchId,
            winnerId: null,
            loserId: null,
            referee,
            manners: []
          })
        });
        
        if (!response.ok) {
          const err = await response.json();
          throw new Error(err.error || '리셋 오류');
        }
        
        // Reset local state selection
        state.selectedWinner[matchId] = null;
        
        showSnackbar('경기 결과가 취소되었습니다.');
        await loadData();
      } catch (err) {
        console.error(err);
        alert(err.message || '리셋 중 문제가 발생했습니다.');
      }
    }

    // --- Snackbar Alert ---
    function showSnackbar(msg) {
      dom.snackbarMsg.textContent = msg;
      dom.snackbar.classList.add('show');
      setTimeout(() => {
        dom.snackbar.classList.remove('show');
      }, 3000);
    }
  </script>
</body>
</html>
